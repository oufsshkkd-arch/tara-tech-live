name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Clean old files on server
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ssl:verify-certificate no
            set ftp:ssl-force true
            set ftp:passive-mode true
            set net:timeout 60
            set net:max-retries 3
            open -u $FTP_USER,$FTP_PASS $FTP_SERVER
            glob --no-symlinks -a rm -rf assets/ images/
            glob --no-symlinks -a rm -f index.html .htaccess favicon.svg story-editorial.png
            quit
          "

      - name: Upload fresh build
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ssl:verify-certificate no
            set ftp:ssl-force true
            set ftp:passive-mode true
            set net:timeout 120
            set net:max-retries 5
            open -u $FTP_USER,$FTP_PASS $FTP_SERVER
            mirror --reverse --verbose --no-perms --parallel=4 ./dist/ ./
            quit
          "
