name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
        run: npm run build

      - name: Stamp build metadata
        run: |
          cat > dist/build.json <<EOF
          {
            "sha": "${GITHUB_SHA}",
            "run": "${GITHUB_RUN_NUMBER}",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy assets first with stale-file deletion
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR || 'public_html' }}
        run: |
          lftp -c "
            set ssl:verify-certificate no
            set ftp:ssl-force true
            set ftp:passive-mode true
            set net:timeout 120
            set net:max-retries 5
            open -u $FTP_USER,$FTP_PASS $FTP_SERVER
            mkdir -p $FTP_TARGET_DIR
            cd $FTP_TARGET_DIR
            mirror --reverse --delete --delete-first --verbose --no-perms --parallel=4 --exclude-glob index.html ./dist/ ./
            quit
          "

      - name: Purge LiteSpeed cache
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR || 'public_html' }}
        run: |
          STAMP=$(date +%s)
          PURGE_FILE="_p${STAMP}.php"

          printf '<?php header("X-LiteSpeed-Purge: *"); echo "purged"; ?>' > /tmp/purge.php

          lftp -c "
            set ssl:verify-certificate no
            set ftp:ssl-force true
            set ftp:passive-mode true
            set net:timeout 30
            set net:max-retries 3
            open -u $FTP_USER,$FTP_PASS $FTP_SERVER
            mkdir -p $FTP_TARGET_DIR
            cd $FTP_TARGET_DIR
            put /tmp/purge.php -o $PURGE_FILE
            quit
          "

          sleep 5
          curl -fsS "https://taratech.pro/${PURGE_FILE}" -H "Cache-Control: no-cache" || true

          sleep 2
          lftp -c "
            set ssl:verify-certificate no
            set ftp:ssl-force true
            set ftp:passive-mode true
            set net:timeout 30
            open -u $FTP_USER,$FTP_PASS $FTP_SERVER
            cd $FTP_TARGET_DIR
            rm $PURGE_FILE
            quit
          " || true

      - name: Upload index.html last
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR || 'public_html' }}
        run: |
          lftp -c "
            set ssl:verify-certificate no
            set ftp:ssl-force true
            set ftp:passive-mode true
            set net:timeout 120
            set net:max-retries 5
            open -u $FTP_USER,$FTP_PASS $FTP_SERVER
            cd $FTP_TARGET_DIR
            put ./dist/index.html -o index.html
            quit
          "
