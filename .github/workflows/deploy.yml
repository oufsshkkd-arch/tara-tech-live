name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via lftp (passive FTPS)
        run: |
          sudo apt-get install -y lftp -qq
          lftp -e "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:passive-mode true;
            set net:timeout 30;
            set net:max-retries 3;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
            mirror --reverse --delete --verbose ./dist/ /public_html/;
            quit
          "
